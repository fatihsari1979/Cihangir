<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cihangir Kapı</title>
    <style>
        * { box-sizing: border-box; margin: 0; }
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #e8eaed;
            margin: 0;
        }

        /* PIN EKRANI */
        #pinScreen {
            background: white;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            text-align: center;
            width: 90%;
            max-width: 360px;
        }
        #pinScreen h2 {
            margin-bottom: 20px;
            color: #1a1a1a;
        }
        #pinScreen input {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            text-align: center;
            letter-spacing: 8px;
            border: 2px solid #ddd;
            border-radius: 14px;
            outline: none;
            transition: 0.2s;
        }
        #pinScreen input:focus {
            border-color: #1a73e8;
        }
        #pinScreen button {
            margin-top: 20px;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        #pinScreen button:active { transform: scale(0.96); }
        #pinError {
            color: #d93025;
            margin-top: 12px;
            font-size: 14px;
            min-height: 20px;
        }

        /* ANA EKRAN (başlangıçta gizli) */
        #mainApp {
            display: none;
            background: white;
            padding: 30px 20px 35px;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        #mainApp h1 {
            font-size: 26px;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .sub {
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-door {
            flex: 1;
            min-width: 130px;
            padding: 22px 0;
            font-size: 20px;
            font-weight: 600;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
            touch-action: manipulation;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-door:active { transform: scale(0.93); }
        .btn-door:disabled {
            opacity: 0.5;
            transform: scale(0.98);
            pointer-events: none;
        }
        .btn-women { background: #e91e63; }  /* Hanımlar pembe */
        .btn-men   { background: #1e88e5; }  /* Erkekler mavi */

        #status {
            margin-top: 25px;
            padding: 14px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 500;
            background: #f1f3f4;
            color: #3c4043;
            transition: all 0.3s;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .status-loading { background: #fff3cd; color: #856404; }
        .status-success { background: #d4edda; color: #155724; }
        .status-error   { background: #f8d7da; color: #721c24; }
        .status-closing { background: #cce5ff; color: #004085; }
    </style>
</head>
<body>

    <!-- PIN EKRANI -->
    <div id="pinScreen">
        <h2>🔐 Yetki Kodu</h2>
        <input type="password" id="pinInput" maxlength="6" placeholder="PIN Girin" inputmode="numeric">
        <button onclick="checkPin()">Giriş Yap</button>
        <div id="pinError"></div>
    </div>

    <!-- ANA UYGULAMA -->
    <div id="mainApp">
        <h1>🚪 Cihangir</h1>
        <div class="sub">Kapı Otomatı</div>

        <div class="button-group">
            <button class="btn-door btn-women" id="btnWomen" onclick="triggerDoor('Hanımlar')">👩 Hanımlar</button>
            <button class="btn-door btn-men" id="btnMen" onclick="triggerDoor('Erkekler')">👨 Erkekler</button>
        </div>

        <div id="status">Hazır</div>
    </div>

    <script>
        // ----------- AYARLAR -----------
        const DOOR_PIN = 2;               // Röle bağlı GPIO pini
        const API_KEY = "C9F3F30A218E7C9F160E12644B9E2AB8";
        const BASE_URL = "https://us01.proxy.teleduino.org/api/1.0/328.php";
        const SECRET_PIN = "1234";        // <-- İstediğiniz şifreyi buraya yazın
        // ------------------------------

        let timer = null;
        const statusEl = document.getElementById('status');
        const btnWomen = document.getElementById('btnWomen');
        const btnMen = document.getElementById('btnMen');

        // PIN kontrolü
        function checkPin() {
            const input = document.getElementById('pinInput');
            const error = document.getElementById('pinError');
            if (input.value === SECRET_PIN) {
                document.getElementById('pinScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                error.textContent = '';
            } else {
                error.textContent = '❌ Yanlış şifre, tekrar deneyin.';
                input.value = '';
                input.focus();
            }
        }

        // Enter tuşuna basınca PIN göndersin
        document.getElementById('pinInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') checkPin();
        });

        // Kapıyı tetikle (AÇ -> 3sn sonra KAPA)
        function triggerDoor(label) {
            // Önceki zamanlayıcıyı temizle
            if (timer) {
                clearTimeout(timer);
                timer = null;
            }

            // Butonları devre dışı bırak (spam önleme)
            btnWomen.disabled = true;
            btnMen.disabled = true;

            // 1. AÇ komutu (output=2)
            setOutput(2)
                .then(() => {
                    statusEl.textContent = `🚪 ${label} kapısı AÇILDI, 3 saniye sonra kapanacak...`;
                    statusEl.className = 'status-success';

                    // 2. 3 saniye sonra KAPA (output=1)
                    timer = setTimeout(() => {
                        setOutput(1)
                            .then(() => {
                                statusEl.textContent = `🔒 ${label} kapısı kapandı.`;
                                statusEl.className = 'status-closing';
                                // Butonları tekrar aktif et
                                btnWomen.disabled = false;
                                btnMen.disabled = false;
                            })
                            .catch(err => {
                                statusEl.textContent = `❌ Kapatma hatası: ${err.message}`;
                                statusEl.className = 'status-error';
                                btnWomen.disabled = false;
                                btnMen.disabled = false;
                            });
                        timer = null;
                    }, 3000); // 3 saniye
                })
                .catch(err => {
                    statusEl.textContent = `❌ Açma hatası: ${err.message}`;
                    statusEl.className = 'status-error';
                    btnWomen.disabled = false;
                    btnMen.disabled = false;
                });
        }

        // Teleduino API'sine istek atan fonksiyon
        function setOutput(outputValue) {
            const url = `${BASE_URL}?k=${API_KEY}&r=setDigitalOutput&pin=${DOOR_PIN}&output=${outputValue}&expire_time=0&save=1`;
            return fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    if (data.status === 200 && data.response?.result === 1) {
                        return true;
                    } else {
                        throw new Error(data.message || 'API cevabı başarısız');
                    }
                });
        }
    </script>
</body>
</html>
