<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cihangir Kapı</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px 20px;
            border-radius: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin: 0 0 10px;
        }
        .sub {
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        button {
            flex: 1;
            padding: 18px 0;
            font-size: 22px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            color: white;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.94);
        }
        .btn-open {
            background: #34a853;
        }
        .btn-close {
            background: #ea4335;
        }
        #status {
            margin-top: 25px;
            padding: 12px;
            border-radius: 12px;
            background: #f0f0f0;
            font-size: 15px;
            color: #333;
            transition: all 0.3s;
        }
        .loading {
            background: #fff3cd;
            color: #856404;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚪 Cihangir</h1>
    <div class="sub">Kapı Otomatı</div>
    <div class="button-group">
        <button class="btn-open" onclick="controlDoor(2)">AÇ</button>
        <button class="btn-close" onclick="controlDoor(1)">KAPA</button>
    </div>
    <div id="status">Hazır</div>
</div>

<script>
    const API_KEY = "C9F3F30A218E7C9F160E12644B9E2AB8"; // Kendi anahtarınız
    const BASE_URL = "https://us01.proxy.teleduino.org/api/1.0/328.php";

    function controlDoor(output) {
        const statusEl = document.getElementById('status');
        statusEl.textContent = '⏳ Gönderiliyor...';
        statusEl.className = 'loading';

        const url = `${BASE_URL}?k=${API_KEY}&r=setDigitalOutput&pin=2&output=${output}&expire_time=0&save=1`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                if (data.status === 200 && data.response?.result === 1) {
                    const action = output === 2 ? 'Açıldı ✅' : 'Kapandı ✅';
                    statusEl.textContent = `Kapı ${action}`;
                    statusEl.className = 'success';
                } else {
                    statusEl.textContent = `❌ Hata: ${data.message || 'Bilinmeyen'}`;
                    statusEl.className = 'error';
                }
            })
            .catch(err => {
                statusEl.textContent = `❌ Bağlantı hatası: ${err.message}`;
                statusEl.className = 'error';
            });
    }
</script>
</body>
</html>
